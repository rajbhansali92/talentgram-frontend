<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Talentgram monogram: serif T flanked by the brand's signature slashes.
       Theme-aware: paints white on dark surfaces (browser dark UI) and
       black on light surfaces. Falls back to black for clients that
       ignore prefers-color-scheme. -->
  <style>
    .ink { fill: #111111; }
    @media (prefers-color-scheme: dark) {
      .ink { fill: #ffffff; }
    }
  </style>
  <g class="ink">
    <!-- Top slash -->
    <path d="M22 8 L42 8 L40 13 L20 13 Z"/>
    <!-- T crossbar -->
    <rect x="14" y="20" width="36" height="6"/>
    <!-- T stem -->
    <rect x="29" y="20" width="6" height="30"/>
    <!-- T serifs (subtle feet) -->
    <rect x="24" y="48" width="16" height="3"/>
    <!-- Bottom slash -->
    <path d="M22 56 L42 56 L40 61 L20 61 Z"/>
  </g>
</svg>
